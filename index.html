<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskify | Modern Task Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <header class="app-header">
      <h1>Taskify</h1>
      <p>Manage your daily tasks easily</p>
    </header>

    <section class="form-section">
      <h2 id="form-title">Add a new task</h2>
      <form id="task-form">
        <input type="hidden" id="task-id">

        <label for="title">Title <span class="required">*</span></label>
        <input type="text" id="title" placeholder="e.g. Finish assignment">
        <small class="error-msg" id="title-error"></small>

        <label for="description">Description</label>
        <textarea id="description" placeholder="Add some details about this task"></textarea>

        <label for="due_date">Due Date</label>
        <input type="date" id="due_date">

        <label for="status">Status</label>
        <select id="status">
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>

        <div class="form-buttons">
          <button type="submit" id="submit-btn">Add Task</button>
          <button type="button" id="cancel-btn" class="hidden">Cancel</button>
        </div>
      </form>
    </section>

    <section class="tasks-section">
      <h2>Your Tasks</h2>
      <div id="tasks-list" class="tasks-list">
        <p class="empty-msg" id="empty-msg">No tasks yet. Add one above!</p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
